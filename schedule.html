<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ساحة مراجعة معسكر العشرة الأوائل</title>
    <style>
        :root { --bg-main: #020617; --card-bg: #0f172a; --border-color: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent-pink: #ec4899; --accent-glow: rgba(236, 72, 153, 0.25); --luxury-gradient: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
        [data-theme="light"] { --bg-main: #f8fafc; --card-bg: #ffffff; --border-color: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; --accent-pink: #db2777; --accent-glow: rgba(219, 39, 119, 0.15); --luxury-gradient: linear-gradient(135deg, #db2777 0%, #7c3aed 100%); }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: system-ui, -apple-system, sans-serif; margin: 0; display: flex; }
        
        /* القائمة الجانبية للربط */
        .sidebar { width: 220px; background: var(--card-bg); border-left: 1px solid var(--border-color); height: 100vh; padding: 20px; position: sticky; top: 0; }
        .sidebar h2 { font-size: 18px; color: var(--accent-pink); margin-bottom: 30px; }
        .sidebar a { display: block; color: var(--text-main); text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: var(--bg-main); text-align: center; font-weight: bold; }
        .sidebar a:hover { background: var(--accent-pink); color: white; }

        .main-content { flex: 1; padding: 20px; }
        header { background: var(--card-bg); padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; border-radius: 12px; margin-bottom: 20px; }
        
        /* باقي الستايلات الأصلية كما هي */
        .direct-add-box { background: var(--card-bg); border: 2px solid var(--accent-pink); padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .inputs-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        input[type="text"], select { flex: 1; min-width: 180px; padding: 12px; border-radius: 8px; background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border-color); }
        .add-btn { background: var(--luxury-gradient); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid-days-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .day-battle-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; }
        .task-item-battle { background: var(--bg-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .task-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .battle-buttons-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-vs-user { padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: bold; }
        .tarek-success { background: rgba(236, 72, 153, 0.2); color: var(--accent-pink); border-color: var(--accent-pink); }
        .hazem-success { background: rgba(16, 185, 129, 0.2); color: #10b981; border-color: #10b981; }
        .theme-toggle-btn { background-color: var(--accent-pink); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>🚀 الملاحة</h2>
        <a href="index.html">الرئيسية</a>
        <a href="schedule.html">جدول المعسكر</a>
        <div style="margin-top: 50px; font-size: 12px; color: var(--text-muted);">
            حالة الربط: <span style="color:#10b981;">نشط 🟢</span>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h1>🏆 ساحة التحدي المشترك</h1>
            <button onclick="toggleTheme()" class="theme-toggle-btn" id="themeBtn">تبديل المظهر</button>
        </header>

        <section class="direct-add-box">
            <h3>إضافة تحدي جديد:</h3>
            <div class="inputs-group">
                <select id="targetDaySelect"><option value="1">اليوم 1</option><option value="3" selected>اليوم 3</option></select>
                <input type="text" id="taskNameInput" placeholder="اسم الدرس...">
                <button class="add-btn" onclick="addNewLiveTask()">إضافة</button>
            </div>
        </section>

        <div class="grid-days-container" id="gridDaysContainer"></div>
    </main>

    <script>
        let localTasksArray = [];

        // المزامنة الفورية: تعمل عند حدوث تغيير في أي صفحة أخرى
        window.addEventListener('storage', (e) => {
            if (e.key === 'local_camp_battle_tasks') {
                loadData(); 
            }
        });

        function loadData() {
            const saved = localStorage.getItem('local_camp_battle_tasks');
            localTasksArray = saved ? JSON.parse(saved) : [];
            renderGridStructure();
        }

        function saveData() {
            localStorage.setItem('local_camp_battle_tasks', JSON.stringify(localTasksArray));
            renderGridStructure();
        }

        // ... (باقي الدوال الخاصة بك كما هي) ...
        function renderGridStructure() {
            const container = document.getElementById('gridDaysContainer');
            container.innerHTML = '';
            // المنطق الخاص بك لعرض الكروت
            localTasksArray.forEach(task => {
                const card = document.createElement('div');
                card.className = 'day-battle-card';
                card.innerHTML = `
                    <div class="task-item-battle">
                        <div class="task-meta">${task.name} <button onclick="deleteLiveTask('${task.id}')">🗑️</button></div>
                        <div class="battle-buttons-zone">
                            <button class="btn-vs-user ${task.meDone ? 'tarek-success' : ''}" onclick="toggleLiveTask('${task.id}', 'tarek', ${task.meDone})">طارق: ${task.meDone ? '✅' : '⏳'}</button>
                            <button class="btn-vs-user ${task.hazemDone ? 'hazem-success' : ''}" onclick="toggleLiveTask('${task.id}', 'hazem', ${task.hazemDone})">حازم: ${task.hazemDone ? '✅' : '⏳'}</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addNewLiveTask() {
            const nameInput = document.getElementById('taskNameInput');
            localTasksArray.push({ id: '_' + Math.random().toString(36).substr(2, 9), day: 3, name: nameInput.value, meDone: false, hazemDone: false });
            saveData();
            nameInput.value = '';
        }

        function toggleLiveTask(taskId, user, status) {
            const task = localTasksArray.find(t => t.id === taskId);
            if(user === 'tarek') task.meDone = !status;
            else task.hazemDone = !status;
            saveData();
        }

        function deleteLiveTask(id) {
            localTasksArray = localTasksArray.filter(t => t.id !== id);
            saveData();
        }

        window.onload = loadData;
    </script>
</body>
</html>
