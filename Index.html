<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحدي المراجعة المشتركة</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🎨 ستايل احترافي فخم ومريح جداً للعين */
        body {
            background: radial-gradient(circle at top right, #0f172a, #1e1b4b);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .day-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .day-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.2);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.1);
        }

        .day-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #f59e0b;
            padding-bottom: 12px;
            margin-bottom: 15px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-row {
            display: grid;
            grid-template-columns: auto 1fr;
            row-gap: 12px;
            column-gap: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .task-row:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .date-badge {
            grid-column: 1;
            background: linear-gradient(135deg, #312e81, #1e1b4b);
            color: #e0e7ff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(99, 102, 241, 0.2);
            height: fit-content;
        }

        .task-text {
            grid-column: 2;
            font-size: 0.95rem;
            font-weight: 500;
            color: #f8fafc;
            line-height: 1.4;
            align-self: center;
            word-break: break-word;
        }

        .task-controls {
            grid-column: 1 / span 2;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
            margin-top: 4px;
        }

        .chk-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .chk-tareq {
            background: rgba(16, 185, 129, 0.06);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.15);
        }
        .chk-tareq:hover { background: rgba(16, 185, 129, 0.15); }

        .chk-hazem {
            background: rgba(99, 102, 241, 0.06);
            color: #6366f1;
            border-color: rgba(99, 102, 241, 0.15);
        }
        .chk-hazem:hover { background: rgba(99, 102, 241, 0.15); }

        .chk-container input {
            accent-color: currentColor;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .task-row.both-done {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.02);
        }
        .task-row.both-done .task-text {
            text-decoration: line-through;
            color: #64748b;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(30, 41, 59, 0.4);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }
        
        .input-group input, .input-group select {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px;
            color: white;
        }

        .input-group button {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
            transition: all 0.2s;
        }
        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        /* ستايل نافذة التنبيهات المضحكة المخصصة */
        .funny-alert {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ef4444;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
            font-weight: bold;
            z-index: 9999;
            display: none;
            animation: slideUp 0.3s ease;
            direction: rtl;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <!-- نافذة الرسائل المضحكة -->
    <div id="funnyAlert" class="funny-alert"></div>

    <nav>
        <div class="brand">🚀 لوحة مراجعة الثانوية العامة | مرحباً <span id="welcomeUser"></span> 👋</div>
        <div class="links">
            <a href="index.html" class="active">🏠 الجدول والمنافسة</a>
            <a href="meet.html">🎥 العداد المشترك والميت</a>
            <a href="login.html" style="color: var(--danger);">🚪 خروج</a>
        </div>
    </nav>

    <div class="card" style="background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.6)); border: 1px solid rgba(255, 255, 255, 0.05);">
        <h2>📊 مؤشر تحدي المراجعة العام (نسبة إنجاز المهام المطلوبة)</h2>
        <div class="vs-container">
            <div class="user-stats">
                <span style="color: #10b981; font-weight: 800; font-size: 1.1rem;">🛠️ البشمهندس طارق</span>
                <div class="progress-bar-bg" style="background: #1e293b; border: 1px solid #334155;"><div id="myProgress" class="progress-bar my-bar" style="background: linear-gradient(90deg, #10b981, #34d399);"></div></div>
                <span id="myPercent" style="font-weight: 800; font-size: 1.2rem; color: #10b981;">0%</span>
            </div>
            <div class="vs-badge" style="box-shadow: 0 0 15px rgba(239, 64, 64, 0.4);">VS</div>
            <div class="user-stats">
                <span style="color: #6366f1; font-weight: 800; font-size: 1.1rem;">🩺 الدكتور حازم</span>
                <div class="progress-bar-bg" style="background: #1e293b; border: 1px solid #334155;"><div id="hazemProgress" class="progress-bar hazem-bar" style="background: linear-gradient(90deg, #6366f1, #818cf8);"></div></div>
                <span id="hazemPercent" style="font-weight: 800; font-size: 1.2rem; color: #6366f1;">0%</span>
            </div>
        </div>
    </div>

    <div class="card" style="background: linear-gradient(135deg, rgba(30, 41, 59, 0.3), rgba(15, 23, 42, 0.4)); border: 1px solid rgba(255, 255, 255, 0.03);">
        <h2>📝 إضافة مهمة مشتركة للجدول</h2>
        <div class="input-group">
            <input type="text" id="taskText" style="flex: 3; min-width: 250px;" placeholder="المهمة (مثال: فرم الباب الأول فيزياء + حل امتحان)...">
            <input type="number" id="taskDayNum" style="width: 110px;" placeholder="يوم كام بالشهر?" min="1" max="31">
            <select id="taskDay" style="width: 130px;">
                <option value="الأحد">الأحد</option><option value="الإثنين">الإثنين</option><option value="الثلاثاء">الثلاثاء</option>
                <option value="الأربعاء">الأربعاء</option><option value="الخميس">الخميس</option><option value="الجمعة">الجمعة</option><option value="السبت">السبت</option>
            </select>
            <button onclick="addTask()">أضف للجدول المشترك ➕</button>
        </div>

        <div class="week-grid" id="weekGrid"></div>
    </div>

    <script>
        const currentUser = localStorage.getItem('currentUser') || "طارق 🛠️";
        // تنظيف الاسم للمقارنة الأمنية لاحقاً
        const isTareqUser = currentUser.includes("طارق");
        document.getElementById('welcomeUser').innerText = isTareqUser ? "طارق" : "حازم";

        const BIN_URL = "https://api.jsonbin.io/v3/b/664ec5b3e41b4d34e4fa4411";
        const API_KEY = "$2b$10$W7bO4S.Vptn6hJUnm/VTeOWeWb2P.qF1fL4UWhpOfb5D8IlyD36wW";
        
        let allData = { tasks: JSON.parse(localStorage.getItem('local_tasks_backup')) || [], timer: {} };
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];

        // مصفوفة الشتايم المضحكة والقفشات عند التطفل 😂
        const trollInsults = [
            "رايح فين يا غبي؟ دي مش مهمتك! شيل إيدك بدل ما اقطعهالك! 🛑",
            "يا ابني سيب خانة زميلك في حالها، روح ذاكرلك كلمتين ينفعوك! 🤫",
            "بتعلم للثاني ليه؟ باصص في ورقة صاحبك حتى في الجدول يا فاشل؟ 🤣",
            "بس يا بابا! العب بعيد، الخصوصية هنا في العالي يا حليتها! 🚷",
            "يا كسلان سيب مهمة الراجل الشغال وعلم على مهامك أنت الأول! 🐴",
            "عامل فيها دحيح وبتعلم لزميلك؟ اتلم يا ضفدع! 🐸"
        ];

        function showTrollAlert(msg) {
            const alertBox = document.getElementById('funnyAlert');
            alertBox.innerText = msg;
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 4500);
        }

        function loadData() {
            fetch(BIN_URL, { 
                method: 'GET',
                headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" } 
            })
            .then(res => { if (!res.ok) throw new Error(); return res.json(); })
            .then(resData => {
                if (resData && resData.tasks) {
                    allData = resData;
                    localStorage.setItem('local_tasks_backup', JSON.stringify(allData.tasks));
                    renderSchedule();
                }
            })
            .catch(err => { renderSchedule(); });
        }

        function renderSchedule() {
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';
            let tTotal = 0, tDone = 0, hTotal = 0, hDone = 0;

            days.forEach(day => {
                let dayTasks = allData.tasks.filter(t => t.day === day);
                dayTasks.sort((a, b) => (parseInt(a.dayNum) || 0) - (parseInt(b.dayNum) || 0));
                let tasksHTML = '';
                
                dayTasks.forEach(task => {
                    tTotal++; if(task.doneTareq) tDone++;
                    hTotal++; if(task.doneHazem) hDone++;

                    let globalIndex = allData.tasks.indexOf(task);
                    let bothDoneClass = (task.doneTareq && task.doneHazem) ? 'both-done' : '';

                    tasksHTML += `
                        <div class="task-row ${bothDoneClass}">
                            <div class="date-badge">📅 ${task.dayNum || '--'} مـ</div>
                            <div class="task-text">${task.text}</div>
                            
                            <div class="task-controls">
                                <!-- خانة طارق -->
                                <label class="chk-container chk-tareq">
                                    <input type="checkbox" ${task.doneTareq ? 'checked' : ''} onclick="validateAndToggle(${globalIndex}, 'tareq', event)">
                                    <span>طارق 🛠️</span>
                                </label>
                                
                                <!-- خانة حازم -->
                                <label class="chk-container chk-hazem">
                                    <input type="checkbox" ${task.doneHazem ? 'checked' : ''} onclick="validateAndToggle(${globalIndex}, 'hazem', event)">
                                    <span>حازم 🩺</span>
                                </label>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML += `
                    <div class="day-card">
                        <div class="day-title">⭐ يوم ${day}</div>
                        <div class="task-list-container">
                            ${dayTasks.length ? tasksHTML : '<span style="color:var(--text-muted); font-size:0.85rem; padding: 10px; display:block; text-align:center;">لا يوجد مهام مشتركة اليوم.. 🎯</span>'}
                        </div>
                    </div>
                `;
            });

            let tPct = tTotal > 0 ? Math.round((tDone/tTotal)*100) : 0;
            let hPct = hTotal > 0 ? Math.round((hDone/hTotal)*100) : 0;
            document.getElementById('myProgress').style.width = tPct + '%';
            document.getElementById('myPercent').innerText = tPct + '%';
            document.getElementById('hazemProgress').style.width = hPct + '%';
            document.getElementById('hazemPercent').innerText = hPct + '%';
        }

        // 🔒 دالة فحص الهوية والخصوصية الفورية والتهزيء المضحك 
        function validateAndToggle(index, targetRole, event) {
            // منع تفعيل التشيك بوكس تلقائياً قبل التأكد من الصلاحية
            event.preventDefault(); 

            if (targetRole === 'tareq' && !isTareqUser) {
                // لو حازم بيحاول يعلم لـ طارق
                const randomInsult = trollInsults[Math.floor(Math.random() * trollInsults.length)];
                showTrollAlert("يا حازم: " + randomInsult);
                return false;
            } 
            else if (targetRole === 'hazem' && isTareqUser) {
                // لو طارق بيحاول يعلم لـ حازم
                const randomInsult = trollInsults[Math.floor(Math.random() * trollInsults.length)];
                showTrollAlert("يا طارق: " + randomInsult);
                return false;
            }

            // لو الهوية مظبوطة، يتم تنفيذ التعليم بنجاح
            if (targetRole === 'tareq') {
                allData.tasks[index].doneTareq = !allData.tasks[index].doneTareq;
                if(allData.tasks[index].doneTareq) showTrollAlert("عاش يا طارق يا دحيح، مبروك المهمة! 🔥");
            } else if (targetRole === 'hazem') {
                allData.tasks[index].doneHazem = !allData.tasks[index].doneHazem;
                if(allData.tasks[index].doneHazem) showTrollAlert("أخيراً خلصت حاجة يا حازم؟ مبروك المعجزة! 🩺😂");
            }
            
            localStorage.setItem('local_tasks_backup', JSON.stringify(allData.tasks));
            renderSchedule(); 
            saveToCloud();
        }

        function addTask() {
            let text = document.getElementById('taskText').value.trim();
            let dayNum = document.getElementById('taskDayNum').value.trim();
            let day = document.getElementById('taskDay').value;
            if(!text) return;

            allData.tasks.push({ text: text, dayNum: dayNum || "1", day: day, doneTareq: false, doneHazem: false });
            document.getElementById('taskText').value = '';
            document.getElementById('taskDayNum').value = '';
            localStorage.setItem('local_tasks_backup', JSON.stringify(allData.tasks));
            renderSchedule(); 
            saveToCloud();    
        }

        function saveToCloud() {
            fetch(BIN_URL, {
                method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(allData)
            });
        }

        window.onload = function() {
            renderSchedule(); 
            loadData();       
            setInterval(loadData, 4000); 
        };
    </script>
</body>
</html>
