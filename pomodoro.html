<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة البومودورو والعداد التنازلي المشترك</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .time-box {
            background: #0f172a;
            border: 2px solid var(--accent-pink);
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 90px;
            text-align: center;
        }
        .time-box span {
            display: block;
            font-size: 36px;
            font-weight: 800;
            color: var(--text-color);
        }
        .time-box label {
            font-size: 13px;
            color: #94a3b8;
        }
        .pomo-modes {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .pomo-btn {
            background-color: #1e293b;
            color: white;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pomo-btn.active, .pomo-btn:hover {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
        }
        .timer-display {
            font-size: 90px;
            font-weight: 900;
            text-align: center;
            margin: 20px 0;
            font-family: monospace;
            color: var(--accent-pink);
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
        }
        .status-badge {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--accent-green);
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <header>
       
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="pomodoro.html" class="active">غرفة البومودورو</a></li>
                <li><a href="schedule.html">جدول المعسكر</a></li>
                <li><a href="summary.html">الملخصات المهمة</a></li>
                <li><button onclick="toggleTheme()" style="background-color: var(--accent-pink); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;" id="themeBtn">المود الفاتح ☀️</button></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="card" style="text-align: center;">
            <h2>⏳ الوقت المتبقي على ماراثون الامتحانات (21/06/2026)</h2>
            <div class="countdown-container">
                <div class="time-box"><span id="exam-days">00</span><label>أيام</label></div>
                <div class="time-box"><span id="exam-hours">00</span><label>ساعات</label></div>
                <div class="time-box"><span id="exam-minutes">00</span><label>دقائق</label></div>
                <div class="time-box"><span id="exam-seconds">00</span><label>ثواني</label></div>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <h2>🎯 عداد البومودورو (تزامن فوري مجاني بالكامل)</h2>
            <div class="status-badge" id="syncStatus">🔄 جاري الاتصال بالشبكة المشتركة...</div>
            
            <div class="pomo-modes">
                <button class="pomo-btn active" onclick="setMode(30, event)">⏱️ 30 د مذكرات + 5 راحة</button>
                <button class="pomo-btn" onclick="setMode(50, event)">⏱️ 50 د مذكرات + 10 راحة</button>
                <button class="pomo-btn" onclick="setMode(25, event)">⏱️ 25 د مذكرات + 5 راحة</button>
                <button class="pomo-btn" onclick="setMode(90, event)">⏱️ 90 د مذكرات + 20 راحة</button>
            </div>

            <div class="timer-display" id="timerDisplay">30:00</div>
            
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 15px;">
                <button onclick="broadcastCommand('start')" style="background-color: var(--accent-green); font-size: 18px;">تشغيل العداد للجميع ▶️</button>
                <button onclick="broadcastCommand('reset')" style="background-color: #ef4444; font-size: 18px;">إيقاف وتصفير 🔄</button>
            </div>
        </div>
    </main>

    <script>
        // التحقق من الباسورد للموقع كاملاً
        if (localStorage.getItem('siteAuth') !== 'true') {
            window.location.href = 'index.html';
        }

        let studyMinutes = 30;
        let totalSeconds = studyMinutes * 60;
        let timerInterval = null;

        function updateDisplay() {
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            document.getElementById('timerDisplay').innerText = 
                (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
        }

        // ======= سحر المزامنة المجانية بدون حسابات (P2P Room) =======
        // السيستم هيعمل شبكة ربط مباشرة بينك (البشمهندس) وبين حازم بناءً على اسم الغرفة الثابت ده
        const ROOM_ID = "mh_secret_camp_2026"; 
        let peer = new Peer();
        let conn = null;

        peer.on('open', (id) => {
            document.getElementById('syncStatus').innerText = "🟢 الغرفة جاهزة! في انتظار دخول الطرف الآخر...";
            
            // محاولة الاتصال التلقائي بالطرف الآخر
            conn = peer.connect(ROOM_ID);
            setupConnection();
        });

        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('syncStatus').innerText = "🟢 تم الاتصال بين البشمهندس وحازم بنجاح! العداد لايف الآن";
            });
            conn.on('data', (data) => {
                // استقبال الأوامر من الطرف الآخر وتنفيذها فوراً
                if (data.command === 'start') {
                    localStart();
                } else if (data.command === 'reset') {
                    localReset();
                } else if (data.command === 'setMode') {
                    studyMinutes = data.minutes;
                    totalSeconds = data.minutes * 60;
                    updateDisplay();
                }
            });
        }

        function broadcastCommand(cmd) {
            if (cmd === 'start') localStart();
            if (cmd === 'reset') localReset();

            if (conn && conn.open) {
                conn.send({ command: cmd });
            }
        }

        function setMode(minutes, event) {
            document.querySelectorAll('.pomo-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            studyMinutes = minutes;
            totalSeconds = minutes * 60;
            updateDisplay();

            if (conn && conn.open) {
                conn.send({ command: 'setMode', minutes: minutes });
            }
            localReset();
        }

        function localStart() {
            if (timerInterval !== null) return;
            timerInterval = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    alert('عاش يا أبطال! وقت المذاكرة خلص.. خذوا بريك ☕');
                }
            }, 1000);
        }

        function localReset() {
            clearInterval(timerInterval);
            timerInterval = null;
            totalSeconds = studyMinutes * 60;
            updateDisplay();
        }

        // ======= عداد الامتحانات الدقيق والمحدث لـ 21/06/2026 =======
        const examDate = new Date("June 21, 2026 09:00:00").getTime();
        
        function startExamCountdown() {
            const now = new Date().getTime();
            const distance = examDate - now;

            if (distance < 0) {
                document.getElementById("exam-days").innerText = "00";
                return;
            }

            document.getElementById("exam-days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("exam-hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("exam-minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("exam-seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }
        
        setInterval(startExamCountdown, 1000);

        // تشغيل فوري
        updateDisplay();
        startExamCountdown();

        function toggleTheme() {
            if (document.documentElement.getAttribute('data-theme') === 'light') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        }
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</body>
</html>
