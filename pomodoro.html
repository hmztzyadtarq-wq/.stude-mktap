<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة البومودورو المتزامنة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .time-box {
            background: #0f172a;
            border: 2px solid var(--accent-pink);
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 90px;
            text-align: center;
        }
        .time-box span {
            display: block;
            font-size: 36px;
            font-weight: 800;
            color: var(--text-color);
        }
        .time-box label {
            font-size: 13px;
            color: #94a3b8;
        }
        .pomo-modes {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .pomo-btn {
            background-color: #1e293b;
            color: white;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pomo-btn.active, .pomo-btn:hover {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
        }
        .timer-display {
            font-size: 90px;
            font-weight: 900;
            text-align: center;
            margin: 20px 0;
            font-family: monospace;
            color: var(--accent-pink);
            text-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
        }
        .status-badge {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--accent-green);
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <header>
        <h1>⏱️ البومودورو وعداد المعسكر الدراسي</h1>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="pomodoro.html" class="active">غرفة البومودورو</a></li>
                <li><a href="schedule.html">جدول المعسكر</a></li>
                <li><a href="summary.html">الملخصات المهمة</a></li>
                <li><button onclick="toggleTheme()" style="background-color: var(--accent-pink); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;" id="themeBtn">المود الفاتح ☀️</button></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="card" style="text-align: center;">
            <h2>⏳ الوقت المتبقي على ماراثون الامتحانات</h2>
            <div class="countdown-container">
                <div class="time-box"><span id="exam-days">00</span><label>أيام</label></div>
                <div class="time-box"><span id="exam-hours">00</span><label>ساعات</label></div>
                <div class="time-box"><span id="exam-minutes">00</span><label>دقائق</label></div>
                <div class="time-box"><span id="exam-seconds">00</span><label>ثواني</label></div>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <h2>🎯 عداد البومودورو المشترك (مباشر بينك وبين حازم)</h2>
            <div class="status-badge" id="syncStatus">🟢 متصل ومُزامن لايف</div>
            
            <div class="pomo-modes">
                <button class="pomo-btn active" onclick="changeRemoteMode(30, 5, 'mode1')">⏱️ 30 د مذكرات + 5 راحة</button>
                <button class="pomo-btn" onclick="changeRemoteMode(50, 10, 'mode2')">⏱️ 50 د مذكرات + 10 راحة</button>
                <button class="pomo-btn" onclick="changeRemoteMode(25, 5, 'mode3')">⏱️ 25 د مذكرات + 5 راحة</button>
                <button class="pomo-btn" onclick="changeRemoteMode(90, 20, 'mode4')">⏱️ 90 د مذكرات + 20 راحة</button>
            </div>

            <div class="timer-display" id="timerDisplay">30:00</div>
            
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 15px;">
                <button onclick="sendTimerCommand('start')" style="background-color: var(--accent-green); font-size: 18px;">تشغيل العداد للجميع ▶️</button>
                <button onclick="sendTimerCommand('reset')" style="background-color: #ef4444; font-size: 18px;">تصفير العداد 🔄</button>
            </div>
        </div>
    </main>

    <script>
        // التحقق من كلمة السر العامة للموقع لحمايته
        if (localStorage.getItem('siteAuth') !== 'true') {
            window.location.href = 'index.html'; // يرجعه للرئيسية يكتب الباسورد
        }

        // إعدادات فايربيس المجانية (تقدر تفتح حساب مجاني وتستبدل دول ببيانات مشروعك عشان يشتغل لايف بنسبة 100%)
        const firebaseConfig = {
            databaseURL: "https://YOUR-PROJECT-ID-DEFAULT-RTDB.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let studyMinutes = 30;
        let totalSeconds = studyMinutes * 60;
        let timerInterval = null;

        // الاستماع للتحديثات اللحظية من فايربيس
        database.ref('pomodoro').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                totalSeconds = data.currentSeconds;
                studyMinutes = data.studyMinutes;
                updateDisplay();
                
                if (data.status === 'running' && !timerInterval) {
                    localStart();
                } else if (data.status === 'stopped') {
                    localStop();
                }
            }
        });

        function updateDisplay() {
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            document.getElementById('timerDisplay').innerText = 
                (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
        }

        function changeRemoteMode(study, breakTime, modeId) {
            database.ref('pomodoro').set({
                studyMinutes: study,
                currentSeconds: study * 60,
                status: 'stopped'
            });
        }

        function sendTimerCommand(command) {
            if (command === 'start') {
                database.ref('pomodoro/status').set('running');
            } else {
                database.ref('pomodoro').update({
                    status: 'stopped',
                    currentSeconds: studyMinutes * 60
                });
            }
        }

        function localStart() {
            timerInterval = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateDisplay();
                    // البشمهندس هو اللي بيحدث الوقت على السيرفر كل ثانية ومزامنتها مع حازم
                    if (totalSeconds % 2 === 0) { 
                        database.ref('pomodoro/currentSeconds').set(totalSeconds);
                    }
                } else {
                    localStop();
                    alert('عاش يا وحوش! وقت المذاكرة خلص.. خدوا بريك ☕');
                }
            }, 1000);
        }

        function localStop() {
            clearInterval(timerInterval);
            timerInterval = null;
            updateDisplay();
        }

        // ======= عداد الامتحانات التنازلي المظبوط لـ 2026 =======
        const examDate = new Date("June 1, 2026 09:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = examDate - now;
            if (distance < 0) return;

            document.getElementById("exam-days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("exam-hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("exam-minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("exam-seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }, 1000);

        function toggleTheme() {
            if (document.documentElement.getAttribute('data-theme') === 'light') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        }
    </script>
</body>
</html>
